<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Foot - 10 Niveaux</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: linear-gradient(135deg, #1b5e20, #2e7d32); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
 .quiz-container { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; max-width: 650px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 3px solid #2e7d32; }
 .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #2e7d32; font-size: 1.1rem; }
 .timer { background: #2e7d32; color: white; padding: 5px 15px; border-radius: 20px; }
 .level-badge { background: #ff9800; color: white; padding: 5px 15px; border-radius: 20px; }
 .question { font-size: 1.3rem; margin-bottom: 15px; color: #1b5e20; font-weight: 600; }
 .question-emoji { font-size: 4rem; text-align: center; margin-bottom: 15px; }
 .options { display: flex; flex-direction: column; gap: 12px; }
 .option { padding: 15px; border: 2px solid #c8e6c9; border-radius: 10px; cursor: pointer; transition: all 0.3s; font-weight: 500; }
 .option:hover { border-color: #2e7d32; background: #e8f5e9; transform: translateX(5px); }
 .option.correct { background: #4caf50; border-color: #4caf50; color: white; }
 .option.wrong { background: #f44336; border-color: #f44336; color: white; }
 .option.disabled { pointer-events: none; }
 .btn { margin-top: 20px; padding: 12px 30px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: bold; }
 .btn:hover { background: #1b5e20; }
 .btn:disabled { background: #ccc; cursor: not-allowed; }
 .result { text-align: center; }
 .result h2 { font-size: 2.2rem; color: #2e7d32; margin-bottom: 10px; }
 .result-emoji { font-size: 5rem; margin: 15px 0; }
 .progress { height: 8px; background: #c8e6c9; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
 .progress-bar { height: 100%; background: #2e7d32; width: 0%; transition: width 0.4s ease; }
 .title { text-align: center; color: #1b5e20; margin-bottom: 15px; font-size: 1.8rem; }
</style>
</head>

    </div>

    <div class="question-emoji" id="questionEmoji"></div>
    <div class="question" id="question"></div>

    <div class="options" id="options"></div>

    <button class="btn" id="nextBtn" style="display:none;">Question Suivante</button>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2 id="resultTitle">Match Terminé!</h2>
    <div class="result-emoji" id="resultEmoji"></div>
    <p id="score" style="font-size: 1.2rem; margin: 15px 0;"></p>
    <button class="btn" id="resultBtn">Rejouer</button>
  </div>
</div>

  // Niveau 6
  [{q: "Question Niv6-1", e: "⚽", o: ["A", "B", "C", "D"], a: 2}, {q: "Question Niv6-2", e: "🏆", o: ["A", "B", "C", "D"], a: 3}, {q: "Question Niv6-3", e: "🥅", o: ["A", "B", "C", "D"], a: 0}, {q: "Question Niv6-4", e: "🇫🇷", o: ["A", "B", "C", "D"], a: 1}, {q: "Question Niv6-5", e: "🇧🇷", o: ["A", "B", "C", "D"], a: 2}, {q: "Question Niv6-6", e: "🇦🇷", o: ["A", "B", "C", "D"], a: 3}, {q: "Question Niv6-7", e: "🇩🇪", o: ["A", "B", "C", "D"], a: 0}, {q: "Question Niv6-8", e: "🇮🇹", o: ["A", "B", "C", "D"], a: 1}, {q: "Question Niv6-9", e: "🇪🇸", o: ["A", "B", "C", "D"], a: 2}, {q: "Question Niv6-10", e: "🇵🇹", o: ["A", "B", "C", "D"], a: 3}],

  // Niveau 7
  [{q: "Question Niv7-1", e: "⚽", o: ["A", "B", "C", "D"], a: 3}, {q: "Question Niv7-2", e: "🏆", o: ["A", "B", "C", "D"], a: 0}, {q: "Question Niv7-3", e: "🥅", o: ["A", "B", "C", "D"], a: 1}, {q: "Question Niv7-4", e: "🇫🇷", o: ["A", "B", "C", "D"], a: 2}, {q: "Question Niv7-5", e: "🇧🇷", o: ["A", "B", "C", "D"], a: 3}, {q: "Question Niv7-6", e: "🇦🇷", o: ["A", "B", "C", "D"], a: 0}, {q: "Question Niv7-7", e: "🇩🇪", o: ["A", "B", "C", "D"], a: 1}, {q: "Question Niv7-8", e: "🇮🇹", o: ["A", "B", "C", "D"], a: 2}, {q: "Question Niv7-9", e: "🇪🇸", o: ["A", "B", "C", "D"], a: 3}, {q: "Question Niv7-10", e: "🇵🇹", o: ["A", "B", "C", "D"], a: 0}],

let currentLevel = 0;
let currentQuestion = 0;
let score = 0;
let timeLeft = 30;
let timer;
let answered = false;
let questions = levels[currentLevel];

const questionEl = document.getElementById('question');
const questionEmojiEl = document.getElementById('questionEmoji');
const optionsEl = document.getElementById('options');
const questionCountEl = document.getElementById('questionCount');
const levelBadgeEl = document.getElementById('levelBadge');
const timerEl = document.getElementById('timer');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const quizEl = document.getElementById('quiz');
const resultEl = document.getElementById('result');
const scoreEl = document.getElementById('score');
const resultEmojiEl = document.getElementById('resultEmoji');
const resultTitleEl = document.getElementById('resultTitle');
const resultBtnEl = document.getElementById('resultBtn');

function loadQuestion() {
  answered = false;
  timeLeft = 30;
  updateTimer();

  const q = questions[currentQuestion];
  questionEl.textContent = q.q;
  questionEmojiEl.textContent = q.e;
  questionCountEl.textContent = `Question ${currentQuestion + 1}/${questions.length}`;
  levelBadgeEl.textContent = `Niveau ${currentLevel + 1}/10`;
  progressBar.style.width = `${(currentQuestion / questions.length) * 100}%`;

  optionsEl.innerHTML = '';
  q.o.forEach((opt, index) => {
    const div = document.createElement('div');
    div.classList.add('option');
    div.textContent = opt;
    div.onclick = () => selectAnswer(index);
    optionsEl.appendChild(div);
  });

  nextBtn.style.display = 'none';
  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timer);
      selectAnswer(-1);
    }
  }, 1000);
}

function updateTimer() {
  timerEl.textContent = `${timeLeft}s`;
  timerEl.style.background = timeLeft <= 5? '#f44336' : '#2e7d32';
}

function selectAnswer(selectedIndex) {
  if (answered) return;
  answered = true;
  clearInterval(timer);

  const correctIndex = questions[currentQuestion].a;
  const options = document.querySelectorAll('.option');

  options.forEach((opt, index) => {
    opt.classList.add('disabled');
    if (index === correctIndex) opt.classList.add('correct');
    if (index === selectedIndex && selectedIndex!== correctIndex) opt.classList.add('wrong');
  });

  if (selectedIndex === correctIndex) score++;
  nextBtn.style.display = 'block';
}

nextBtn.onclick = () => {
  currentQuestion++;
  if (currentQuestion < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  quizEl.style.display = 'none';
  resultEl.style.display = 'block';
  progressBar.style.width = '100%';

  if (score >= 8) {
    if (currentLevel < levels.length - 1) {
      resultTitleEl.textContent = 'Niveau Validé!';
      scoreEl.innerHTML = `Bravo! Tu passes au niveau ${currentLevel + 2}<br>Score: ${score}/10`;
      resultEmojiEl.textContent = '🔓';
      resultBtnEl.textContent = 'Niveau Suivant';
      resultBtnEl.onclick = nextLevel;
    } else {
      resultTitleEl.textContent = 'Légende du Foot!';
      scoreEl.innerHTML = `Tu as fini les 10 niveaux!<br>Score final: ${score}/10`;
      resultEmojiEl.textContent = '🏆';
      resultBtnEl.textContent = 'Recommencer';
      resultBtnEl.onclick = resetGame;
    }
  } else {
    resultTitleEl.textContent = 'Échec';
    scoreEl.innerHTML = `Il faut 8/10 pour passer<br>Score: ${score}/10`;
    resultEmojiEl.textContent = score >= 5? '⚽' : '💪';
    resultBtnEl.textContent = 'Rejouer le niveau';
    resultBtnEl.onclick = restartLevel;
  }
}

function nextLevel() {
  currentLevel++;
  questions = levels[currentLevel];
  restartLevel();
}

function restartLevel() {
  currentQuestion = 0;
  score = 0;
  resultEl.style.display = 'none';
  quizEl.style.display = 'block';
  loadQuestion();
}

function resetGame() {
  currentLevel = 0;
  questions = levels[currentLevel];
  restartLevel();
}

loadQuestion();
</script>
